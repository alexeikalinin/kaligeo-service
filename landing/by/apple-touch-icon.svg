  <!-- Radar rings -->
  <circle cx="115" cy="90" r="65" fill="none" stroke="#1E2129" stroke-width="1.5"/>
  <circle cx="115" cy="90" r="42" fill="none" stroke="#252A35" stroke-width="1.5"/>
  <circle cx="115" cy="90" r="20" fill="none" stroke="#2E3440" stroke-width="1.5"/>

  <!-- Target -->
  <circle cx="115" cy="90" r="8" fill="none" stroke="#C8F24A" stroke-width="2"/>
  <circle cx="115" cy="90" r="3" fill="#C8F24A"/>
  <circle cx="115" cy="25" r="3.5" fill="#C8F24A" opacity="0.6"/>

  <!-- K letterform -->
