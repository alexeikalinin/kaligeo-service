<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>KaliGEO — Slide Template</title>
<link rel="stylesheet" href="tokens.css">
<style>
  /* The page itself just hosts ONE slide at 1920×1080.
     For multi-slide decks, swap this for the deck_stage.js starter and put
     each <section class="slide slide--full"> as a direct child of <deck-stage>. */
  body{display:grid;place-items:center;min-height:100vh;background:#1a1c20;
       padding:40px}
  .stage{width:1920px;height:1080px;transform-origin:top left}
  @media (max-width: 2000px){
    /* simple fit-to-viewport scale for preview */
    .stage{transform:scale(calc((100vw - 80px)/1920))}
  }
</style>
</head>
<body>

  <div class="stage">

    <!-- ════════════════════════════════════════════════
         EXAMPLE: Stat slide with sparkline (pattern 03A)
         Replace with whichever pattern you need. See
         STYLE_GUIDE.md §5 for the full catalog.
         ════════════════════════════════════════════════ -->
    <section class="slide slide--full" style="height:100%">

      <div class="slide-eyebrow eyebrow">Раздел · Заголовок секции</div>

      <div class="slide-content" style="display:grid;grid-template-columns:auto 1fr;gap:80px;align-items:center">

        <!-- Big number -->
        <div class="t-stat" style="font-size:220px">
          63<span style="color:var(--accent)">%</span>
        </div>

        <!-- Sparkline + supporting copy -->
        <div style="display:flex;flex-direction:column;gap:20px;max-width:520px">
          <span class="t-mono">↗ +51 п.п. за 4 года</span>

          <svg width="320" height="96" viewBox="0 0 320 96" style="overflow:visible">
            <polyline points="0,84 80,72 160,48 240,28 320,8" fill="none"
              stroke="var(--ink)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="320" cy="8" r="8" fill="var(--accent)" stroke="var(--ink)" stroke-width="3"/>
          </svg>

          <div class="spark-axis" style="width:320px;font-size:14px">
            <span>2022</span><span>2026</span>
          </div>

          <p class="t-body-lg" style="margin-top:8px;font-family:var(--font-serif);
             font-style:italic;font-size:32px;color:var(--ink);max-width:480px">
            покупательских запросов теперь идут <em>через AI</em>
          </p>

          <span class="t-mono">— Stripe Search Trends · Q1 2026 · n=12,400</span>
        </div>

      </div>

      <div class="slide-type">01 · Stat — sparkline</div>

    </section>

  </div>

</body>
</html>
